<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Ravenmails illustration">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08261c"/>
      <stop offset="0.6" stop-color="#0c3a2b"/>
      <stop offset="1" stop-color="#0f6b4e"/>
    </linearGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <rect width="1200" height="675" fill="url(#glow2)"/>

  <!-- emblem -->
  <g transform="translate(600 320)">
    <circle r="150" fill="#0a4733" stroke="#d4af37" stroke-opacity="0.55" stroke-width="3"/>
    <!-- atom -->
    <g stroke="#d4af37" stroke-width="4" fill="none">
      <ellipse rx="120" ry="46"/>
      <ellipse rx="120" ry="46" transform="rotate(60)"/>
      <ellipse rx="120" ry="46" transform="rotate(120)"/>
    </g>
    <circle r="16" fill="#f1e9d2"/>
    <!-- three "eyes" nod to the raven mark -->
    <g fill="#f1e9d2"><circle cx="-46" cy="64" r="6"/><circle cx="0" cy="84" r="6"/><circle cx="46" cy="64" r="6"/></g>
  </g>

  <!-- wordmark -->
  <g transform="translate(64 612)" fill="#f1e9d2" font-family="Georgia, serif">
    <path d="M0,-22 L14,-30 L28,-22 L28,-6 L14,2 L0,-6 Z" fill="#d4af37"/>
    <text x="42" y="-4" font-size="30" font-weight="700" letter-spacing="1">RAVENMAILS</text>
  </g>

  <!-- illustration tag -->
  <g transform="translate(1040 44)">
    <rect x="-2" y="-22" width="118" height="32" rx="16" fill="#000" fill-opacity="0.28" stroke="#d4af37" stroke-opacity="0.6"/>
    <text x="56" y="0" text-anchor="middle" font-family="-apple-system, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5" fill="#f1e9d2">ILLUSTRATION</text>
  </g>
</svg>
