<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Illustration: dengue cases falling now while a warming climate raises long-term mosquito-borne risk">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08261c"/>
      <stop offset="0.55" stop-color="#0c3a2b"/>
      <stop offset="1" stop-color="#0f6b4e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.65">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- baseline -->
  <line x1="150" y1="430" x2="1050" y2="430" stroke="#7fb89f" stroke-opacity="0.4" stroke-width="2"/>

  <!-- short-term cases DOWN (green dashed, falling) -->
  <path d="M180 230 L360 300 L540 360 L700 400" fill="none" stroke="#7fe0b0" stroke-width="6"
        stroke-linecap="round" stroke-dasharray="2 16" stroke-opacity="0.9"/>
  <text x="200" y="205" font-family="-apple-system, Arial, sans-serif" font-size="20" font-weight="700"
        letter-spacing="1" fill="#7fe0b0">CASES NOW ↓</text>

  <!-- long-term risk UP (gold, rising) -->
  <path d="M520 410 L700 360 L860 290 L1030 190" fill="none" stroke="#d4af37" stroke-width="7" stroke-linecap="round"/>
  <text x="980" y="165" text-anchor="end" font-family="-apple-system, Arial, sans-serif" font-size="20"
        font-weight="700" letter-spacing="1" fill="#d4af37">CLIMATE RISK ↑</text>

  <!-- thermometer -->
  <g transform="translate(150 300)">
    <rect x="-10" y="-120" width="20" height="120" rx="10" fill="#0a4733" stroke="#f1e9d2" stroke-width="3"/>
    <circle cx="0" cy="14" r="22" fill="#e2483d" stroke="#f1e9d2" stroke-width="3"/>
    <rect x="-6" y="-40" width="12" height="58" rx="6" fill="#e2483d"/>
  </g>

  <!-- mosquito silhouette -->
  <g transform="translate(900 430)" stroke="#f1e9d2" stroke-width="4" fill="none" stroke-linecap="round" stroke-opacity="0.9">
    <ellipse cx="0" cy="0" rx="10" ry="26" fill="#f1e9d2" stroke="none"/>
    <line x1="0" y1="-22" x2="0" y2="-44"/>
    <path d="M-6 -16 q-46 -28 -70 -10"/><path d="M6 -16 q46 -28 70 -10"/>
    <path d="M-6 -6 q-40 -6 -64 8"/><path d="M6 -6 q40 -6 64 8"/>
    <line x1="-4" y1="22" x2="-26" y2="44"/><line x1="4" y1="22" x2="26" y2="44"/>
  </g>

  <!-- caption strip -->
  <text x="600" y="540" text-anchor="middle" font-family="-apple-system, Arial, sans-serif"
        font-size="22" font-weight="600" letter-spacing="3" fill="#f1e9d2" fill-opacity="0.85">
    DENGUE &amp; THE CLIMATE · PHILIPPINES
  </text>

  <!-- wordmark -->
  <g transform="translate(64 590)" fill="#f1e9d2" font-family="Georgia, serif">
    <path d="M0,-22 L14,-30 L28,-22 L28,-6 L14,2 L0,-6 Z" fill="#d4af37"/>
    <text x="42" y="-4" font-size="30" font-weight="700" letter-spacing="1">RAVENMAILS</text>
  </g>

  <!-- illustration tag -->
  <g transform="translate(1040 44)">
    <rect x="-2" y="-22" width="118" height="32" rx="16" fill="#000" fill-opacity="0.28" stroke="#d4af37" stroke-opacity="0.6"/>
    <text x="56" y="0" text-anchor="middle" font-family="-apple-system, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5" fill="#f1e9d2">ILLUSTRATION</text>
  </g>
</svg>
