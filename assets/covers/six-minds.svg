<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Illustration: six Filipino scientists recognized in Asia's Top 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08261c"/>
      <stop offset="0.55" stop-color="#0c3a2b"/>
      <stop offset="1" stop-color="#0f6b4e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.2" r="0.6">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>

  <!-- globe -->
  <g transform="translate(600 360)">
    <circle r="190" fill="none" stroke="#d4af37" stroke-opacity="0.25" stroke-width="2"/>
    <circle r="150" fill="#0a4733" stroke="#d4af37" stroke-opacity="0.5" stroke-width="2"/>
    <ellipse rx="150" ry="56" fill="none" stroke="#7fb89f" stroke-opacity="0.45" stroke-width="2"/>
    <ellipse rx="92" ry="150" fill="none" stroke="#7fb89f" stroke-opacity="0.45" stroke-width="2"/>
    <line x1="-150" y1="0" x2="150" y2="0" stroke="#7fb89f" stroke-opacity="0.45" stroke-width="2"/>
    <!-- simple PH-ish archipelago dots -->
    <g fill="#f1e9d2">
      <circle cx="18" cy="-40" r="7"/><circle cx="34" cy="-10" r="9"/>
      <circle cx="20" cy="22" r="6"/><circle cx="40" cy="44" r="8"/>
      <circle cx="10" cy="58" r="5"/>
    </g>
  </g>

  <!-- six gold stars in an arc -->
  <g fill="#d4af37">
    <g transform="translate(330 200)"><path d="M0,-26 6.6,-8 25,-8 10,4 16,22 0,11 -16,22 -10,4 -25,-8 -6.6,-8Z"/></g>
    <g transform="translate(440 130)"><path d="M0,-26 6.6,-8 25,-8 10,4 16,22 0,11 -16,22 -10,4 -25,-8 -6.6,-8Z"/></g>
    <g transform="translate(560 100)"><path d="M0,-30 7.6,-9 29,-9 11,5 18,26 0,13 -18,26 -11,5 -29,-9 -7.6,-9Z"/></g>
    <g transform="translate(680 100)"><path d="M0,-30 7.6,-9 29,-9 11,5 18,26 0,13 -18,26 -11,5 -29,-9 -7.6,-9Z"/></g>
    <g transform="translate(800 130)"><path d="M0,-26 6.6,-8 25,-8 10,4 16,22 0,11 -16,22 -10,4 -25,-8 -6.6,-8Z"/></g>
    <g transform="translate(910 200)"><path d="M0,-26 6.6,-8 25,-8 10,4 16,22 0,11 -16,22 -10,4 -25,-8 -6.6,-8Z"/></g>
  </g>

  <!-- wordmark -->
  <g transform="translate(64 612)" fill="#f1e9d2" font-family="Georgia, serif">
    <path d="M0,-22 L14,-30 L28,-22 L28,-6 L14,2 L0,-6 Z" fill="#d4af37"/>
    <text x="42" y="-4" font-size="30" font-weight="700" letter-spacing="1">RAVENMAILS</text>
  </g>

  <!-- illustration tag -->
  <g transform="translate(1040 44)">
    <rect x="-2" y="-22" width="118" height="32" rx="16" fill="#000" fill-opacity="0.28" stroke="#d4af37" stroke-opacity="0.6"/>
    <text x="56" y="0" text-anchor="middle" font-family="-apple-system, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5" fill="#f1e9d2">ILLUSTRATION</text>
  </g>
</svg>
