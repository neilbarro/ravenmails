<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Illustration: a fact-check verdict marking a viral energy-lockdown advisory as false">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08261c"/>
      <stop offset="0.55" stop-color="#0c3a2b"/>
      <stop offset="1" stop-color="#0f6b4e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.65">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- the fake "advisory" card, tilted -->
  <g transform="translate(440 300) rotate(-8)">
    <rect x="-150" y="-180" width="300" height="360" rx="14" fill="#0a4733" stroke="#d4af37" stroke-opacity="0.5" stroke-width="3"/>
    <!-- faux power/bolt seal -->
    <g transform="translate(0 -120)" fill="#d4af37" fill-opacity="0.85">
      <path d="M8,-34 -18,6 0,6 -8,34 20,-8 2,-8 Z"/>
    </g>
    <g fill="#f1e9d2" fill-opacity="0.55">
      <rect x="-110" y="-66" width="220" height="14" rx="7"/>
      <rect x="-110" y="-38" width="220" height="10" rx="5"/>
      <rect x="-110" y="-18" width="180" height="10" rx="5"/>
      <rect x="-110" y="2" width="200" height="10" rx="5"/>
      <rect x="-110" y="22" width="150" height="10" rx="5"/>
      <rect x="-110" y="60" width="220" height="10" rx="5"/>
      <rect x="-110" y="80" width="190" height="10" rx="5"/>
    </g>
  </g>

  <!-- big red FALSE stamp / circle-slash over it -->
  <g transform="translate(720 320)">
    <circle r="150" fill="none" stroke="#e2483d" stroke-width="22" stroke-opacity="0.92"/>
    <line x1="-106" y1="-106" x2="106" y2="106" stroke="#e2483d" stroke-width="22" stroke-opacity="0.92" stroke-linecap="round"/>
  </g>

  <!-- caption strip -->
  <text x="600" y="540" text-anchor="middle" font-family="-apple-system, Arial, sans-serif"
        font-size="24" font-weight="700" letter-spacing="4" fill="#f1e9d2" fill-opacity="0.9">
    FACT-CHECK · VERDICT: FALSE
  </text>

  <!-- wordmark -->
  <g transform="translate(64 590)" fill="#f1e9d2" font-family="Georgia, serif">
    <path d="M0,-22 L14,-30 L28,-22 L28,-6 L14,2 L0,-6 Z" fill="#d4af37"/>
    <text x="42" y="-4" font-size="30" font-weight="700" letter-spacing="1">RAVENMAILS</text>
  </g>

  <!-- illustration tag -->
  <g transform="translate(1040 44)">
    <rect x="-2" y="-22" width="118" height="32" rx="16" fill="#000" fill-opacity="0.28" stroke="#d4af37" stroke-opacity="0.6"/>
    <text x="56" y="0" text-anchor="middle" font-family="-apple-system, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5" fill="#f1e9d2">ILLUSTRATION</text>
  </g>
</svg>
